<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리의 방식 | JinahONPlayer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero-card">
      <div class="cover-wrap">
        <img
          src="Images/TheWayForUs.jpg"
          alt="권진아 우리의 방식 앨범 커버"
          class="cover-image"
        />
      </div>

      <div class="hero-meta">
        <p class="artist">KWON JIN AH</p>
        <h1>우리의 방식</h1>
        <p class="album-type">EP Elbum • JinahONPlayer</p>

        <div class="meta-pills">
          <span class="pill">YouTube Playlist</span>
          <span class="pill">Official Channel</span>
          <span class="pill">Mobile Friendly</span>
        </div>
      </div>
    </section>

    <section class="player-card">
      <div class="section-head">
        <div>
          <p class="section-kicker">PLAYLIST</p>
          <h2>우리의 방식 공식 재생목록</h2>
        </div>
      </div>

      <div class="player-frame-wrap">
        <iframe
          class="youtube-frame"
          src="https://www.youtube.com/embed/videoseries?list=OLAK5uy_nxQfdi3BTYk4rRbBmURXYdIWcMs6Ayp-s&controls=1&modestbranding=1&rel=0"
          title="권진아 우리의 방식 유튜브 재생목록"
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <section class="info-card">
      <div class="section-head compact">
        <div>
          <p class="section-kicker">INFO</p>
          <h2>메모</h2>
        </div>
      </div>

      <ul class="info-list">
        <li> 1. 우리의 방식  The Way For Us</li>
        <li> 2. 잘 가  Good Bye</li>
        <li> 3. 꽃말  Flower Heart</li>
        <li> 4. 어른처럼 (with. 죠지)  Pretend To Be</li>
        <li> 5. 여행가  The Dreamer</li>
      </ul>
    </section>
  </main>
</body>
</html>
