<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리의 방식</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="player-wrap">
    <div class="top-section">
      <div class="cover-panel">
        <img
          src="Images/TheWayForUs.jpg"
          alt="앨범 커버"
          class="cover-image"
        />
      </div>

      <div class="info-panel">
        <h1>우리의 방식</h1>
        <p class="subtitle">Mini CD Player</p>

        <div class="track-panel">
          <h2>Play List</h2>
          <ul id="trackList"></ul>
        </div>
      </div>
    </div>

    <div class="bottom-section">
  <div class="audio-panel custom-player">
    <div class="progress-wrap">
      <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1" />
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn side-btn" id="prevBtn" aria-label="이전 곡">
        &#10094;
      </button>

      <button class="control-btn play-btn" id="playPauseBtn" aria-label="재생">
        <span id="playIcon">&#9654;</span>
      </button>

      <button class="control-btn side-btn" id="nextBtn" aria-label="다음 곡">
        &#10095;
      </button>
    </div>

    <audio id="audioPlayer"></audio>
  </div>
</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
