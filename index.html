<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리의 방식</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="player-wrap">
    <div class="top-section">
      <div class="cover-panel">
        <img
          src="Images/TheWayForUs.jpg"
          alt="앨범 커버"
          class="cover-image"
        />
      </div>

      <div class="info-panel">
        <h1>우리의 방식</h1>
        <p class="subtitle">Mini CD Player</p>

        <div class="track-panel">
          <h2>Track List</h2>
          <ul id="trackList"></ul>
        </div>
      </div>
    </div>

    <div class="bottom-section">
      <button id="prevButton" class="nav-button">이전 곡</button>

      <div class="audio-panel">
        <audio id="audioPlayer" controls></audio>
      </div>

      <button id="nextButton" class="nav-button">다음 곡</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
